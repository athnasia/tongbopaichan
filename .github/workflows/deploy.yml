name: Deploy static content to Pages

on:
  push:
    branches: ['main'] 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 新增步骤：提前安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 使用最新的 pnpm 版本

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # 这里告诉 GitHub 缓存 pnpm 的依赖

      - name: Install dependencies
        run: pnpm install # 命令改用 pnpm

      - name: Build
        run: pnpm run build # 命令改用 pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4